services:
  logger.channel.my_helper:
    parent: logger.channel_base
    arguments:
      - 'my_helper'

  my_helper.greeting_generator:
    class: Drupal\my_helper\GreetingGenerator
    arguments:
      - '@database'
      - '@current_user'
      - '@datetime.time'
      - '@date.formatter'

  my_helper.login_handler:
    class: Drupal\my_helper\LoginHandler
    arguments:
      - '@logger.channel.my_helper'
      - '@messenger'
